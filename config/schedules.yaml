# 定时任务配置
# 用于 OpenClaw cron jobs

# ==================== 巡检消息 ====================
# 每天 09:00
schedules:
  # 早上巡检推送
  - id: health-morning
    name: 早间巡检推送
    cron: "0 9 * * *"
    enabled: true
    action:
      type: script
      script: scripts/health_check.py
      args: ["--type", "morning", "--send"]
    message_template: "【AI Quant Brain】早间巡检"

  # 晚间巡检推送
  - id: health-evening
    name: 晚间巡检推送
    cron: "0 21 * * *"
    enabled: true
    action:
      type: script
      script: scripts/health_check.py
      args: ["--type", "evening", "--send"]
    message_template: "【AI Quant Brain】晚间巡检"

# ==================== 异常主动告警 ====================
# 每15分钟检查一次
  # 异常告警检查
  - id: alert-check
    name: 异常主动告警检查
    cron: "*/15 * * * *"
    enabled: true
    action:
      type: script
      script: scripts/telegram_alert.py
      args: ["--check"]
    message_template: "【AI Quant Brain】异常告警"

# ==================== 内容推送 (暂禁用) ====================
  # 早上新闻推送
  - id: news-morning
    name: 早上新闻推送
    cron: "0 9 * * *"
    enabled: false
    action:
      type: script
      script: skills/news-geopolitics/scripts/news_report.py
    message_template: "【财富助手】早上好！今日新闻已更新"

  # 晚上量化汇报
  - id: quant-evening
    name: 晚上量化汇报
    cron: "0 21 * * *"
    enabled: false
    action:
      type: script
      script: skills/quant-analyst/scripts/quant_report.py
    message_template: "【财富助手】今日量化汇报"

  # 周三小红书
  - id: xhs-wednesday
    name: 小红书周三发布
    cron: "0 21 * * 3"
    enabled: false
    action:
      type: skill
      skill: xhs-operator
    message_template: "【小红书】周三发布时间到了"

  # 周日小红书
  - id: xhs-sunday
    name: 小红书周日发布
    cron: "0 21 * * 0"
    enabled: false
    action:
      type: skill
      skill: xhs-operator
    message_template: "【小红书】周日发布时间到了"

# ==================== 说明 ====================
# 消息类型:
# 1. 巡检消息 - 每天 09:00 / 21:00 定时推送
# 2. 异常主动告警 - 每15分钟检查，异常时即时推送
# 3. 恢复通知 - 异常恢复后即时推送
